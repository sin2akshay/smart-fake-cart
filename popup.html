<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Cart</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- ══ HEADER ══════════════════════════════════════════════════════ -->
    <header class="header">
      <div class="logo">
        <div class="logo-icon">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
          >
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path
              d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
            />
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-name">Smart Cart</span>
          <span class="logo-sub">Built for EAGv3</span>
        </div>
      </div>
      <div class="header-right">
        <div id="active-provider-pill" class="provider-pill hidden"></div>
        <button id="btn-settings" class="icon-btn" title="Settings">
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
        </button>
      </div>
    </header>

    <!-- ══ SETUP SCREEN ═════════════════════════════════════════════════ -->
    <div id="screen-setup" class="screen">
      <div class="setup-hero">
        <div class="setup-hero-icon">✦</div>
        <div class="setup-hero-text">
          <div class="setup-hero-title">Connect Gemini</div>
          <div class="setup-hero-sub">
            Paste your Google AI Studio API key below
          </div>
        </div>
      </div>

      <div class="setup-section">
        <p class="field-label">Gemini API Key</p>
        <input
          type="password"
          id="api-key-input"
          class="field-input"
          placeholder="AIza…"
          autocomplete="off"
        />
        <a
          class="field-hint"
          href="https://aistudio.google.com/apikey"
          target="_blank"
          >Get your free API key at aistudio.google.com ↗</a
        >
      </div>

      <div class="setup-section">
        <div class="field-row">
          <p class="field-label" style="margin: 0">Model</p>
          <button id="btn-fetch-models" class="text-btn">
            ↻ Fetch from API
          </button>
        </div>
        <div class="select-wrap">
          <select id="model-select">
            <option value="gemini-3.1-flash-lite-preview" selected>
              gemini-3.1-flash-lite-preview
            </option>
            <option value="gemini-2.5-pro-preview-05-06">
              gemini-2.5-pro-preview
            </option>
            <option value="gemini-2.0-flash">gemini-2.0-flash</option>
            <option value="gemini-2.0-flash-lite">gemini-2.0-flash-lite</option>
            <option value="gemini-1.5-pro">gemini-1.5-pro</option>
            <option value="gemini-1.5-flash">gemini-1.5-flash</option>
            <option value="gemini-1.5-flash-8b">gemini-1.5-flash-8b</option>
          </select>
          <span class="select-caret">▾</span>
        </div>
        <p id="fetch-status" class="field-hint" style="margin-top: 6px"></p>
      </div>

      <button id="btn-save-key" class="cta-btn">
        Connect
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <path d="M5 12h14M12 5l7 7-7 7" />
        </svg>
      </button>
    </div>

    <!-- ══ MAIN SCREEN ══════════════════════════════════════════════════ -->
    <div id="screen-main" class="screen-main hidden">
      <!-- Always-visible top controls -->
      <div class="top-controls">
        <div class="url-bar">
          <input
            type="text"
            id="product-url"
            placeholder="Paste an Amazon or Flipkart product URL…"
          />
          <button id="btn-current-tab" class="icon-btn" title="Use current tab">
            <svg
              width="15"
              height="15"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="2" y="3" width="20" height="14" rx="2" />
              <path d="M8 21h8M12 17v4" />
            </svg>
          </button>
        </div>
        <button id="btn-analyze" class="cta-btn">
          <svg
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.35-4.35" />
          </svg>
          Ask Agent: Should I buy now?
        </button>
      </div>

      <!-- Tab bar -->
      <div class="tab-bar">
        <button class="tab active" data-tab="analysis">
          <svg
            width="12"
            height="12"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.5"
          >
            <polyline points="22 12 18 12 15 21 9 3 6 12 2 12" />
          </svg>
          Analysis
        </button>
        <button class="tab" data-tab="logs">
          <span class="tab-live-dot" id="log-dot"></span>
          Logs
          <span class="tab-badge" id="log-count">0</span>
        </button>
      </div>

      <!-- ── Analysis tab ── -->
      <div id="tab-analysis" class="tab-content">
        <div id="chain-wrap" class="chain-wrap hidden">
          <div class="chain-header">
            <div class="chain-title">
              <span class="live-dot"></span>
              Agent Reasoning
            </div>
            <button id="btn-clear" class="text-btn">Clear</button>
          </div>
          <div id="chain" class="chain"></div>
        </div>

        <div id="alerts-panel" class="alerts-panel hidden">
          <div class="alerts-header">
            <span class="alerts-title">Price Alerts</span>
            <span id="alert-count" class="count-badge">0</span>
          </div>
          <div id="alerts-list"></div>
        </div>
      </div>

      <!-- ── Logs tab ── -->
      <div id="tab-logs" class="tab-content tab-logs-content hidden">
        <div class="log-toolbar">
          <span class="log-toolbar-label">Agent Logs</span>
          <div class="log-toolbar-actions">
            <button id="btn-copy-logs" class="log-action-btn">
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" />
                <path
                  d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
                />
              </svg>
              Copy all
            </button>
            <button id="btn-clear-logs" class="log-action-btn">Clear</button>
          </div>
        </div>
        <div id="log-terminal" class="log-terminal-full"></div>
      </div>
    </div>

    <!-- ══ STATUS BAR ═══════════════════════════════════════════════════ -->
    <div class="statusbar">
      <span id="status-text" class="sb-status">Ready</span>
      <div class="sb-right">
        <span id="sb-step" class="sb-chip hidden"></span>
        <span id="sb-tokens" class="sb-chip hidden"></span>
        <span id="sb-timer" class="sb-chip sb-timer hidden"></span>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
